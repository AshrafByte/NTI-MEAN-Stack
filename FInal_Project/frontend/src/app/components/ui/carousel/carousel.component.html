<div class="relative w-full h-96 overflow-hidden rounded-lg bg-gray-200">
  <!-- Images container -->
  <div class="relative w-full h-full">
    <div
      *ngFor="let slide of slides; let i = index"
      class="absolute inset-0 w-full h-full transition-transform duration-500 ease-in-out"
      [style.transform]="'translateX(' + (100 * (i - currentSlide)) + '%)'">

      <img
        [src]="slide"
        [alt]="'Slide ' + (i + 1)"
        class="w-full h-full object-cover">
    </div>
  </div>

  <!-- Navigation arrows -->
  <button
    (click)="prevSlide()"
    class="absolute left-4 top-1/2 transform -translate-y-1/2 bg-white bg-opacity-70 hover:bg-opacity-90 text-gray-700 w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 shadow-md">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
    </svg>
  </button>

  <button
    (click)="nextSlide()"
    class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-white bg-opacity-70 hover:bg-opacity-90 text-gray-700 w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 shadow-md">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
    </svg>
  </button>

  <!-- Dots indicator -->
  <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2">
    <button
      *ngFor="let slide of slides; let i = index"
      (click)="goToSlide(i)"
      class="w-3 h-3 rounded-full transition-all duration-200"
      [class]="i === currentSlide ? 'bg-white' : 'bg-white bg-opacity-50'">
    </button>
  </div>
</div>
